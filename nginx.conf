# ─────────────────────────────────────────────────────────────────
# nginx/nginx.conf
# Main Nginx reverse proxy configuration
#
# How traffic flows:
#   Browser → Nginx :80 → routes based on URL path:
#     /api/*    → FastAPI backend (port 8000)
#     /docs     → FastAPI Swagger UI
#     /*        → React frontend (port 3000)
#
# This means the browser only talks to ONE port (80),
# and Nginx silently routes to the right service.
# ─────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream services ─────────────────────────────────────────
    # Docker service names resolve automatically inside Docker network
    upstream backend {
        server backend:8000;    # FastAPI container
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;     # React/Nginx container
    }

    # ── Main server block ─────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Max upload size (for future file uploads)
        client_max_body_size 10M;

        # ── API routes → FastAPI ──────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Pass real client info to the backend
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — important for AI advisor (model can be slow)
            proxy_connect_timeout 30s;
            proxy_read_timeout    180s;   # 3 min for AI responses
            proxy_send_timeout    30s;
        }

        # ── FastAPI docs → FastAPI ────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json|health) {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ── Everything else → React frontend ─────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Important: let React Router handle client-side routing
            proxy_intercept_errors on;
            error_page 404 = @frontend_fallback;
        }

        location @frontend_fallback {
            proxy_pass http://frontend;
        }
    }
}
