# ─────────────────────────────────────────────────────────────────
# docker-compose.yml  —  WealthTracker Development Stack
#
# Services:
#   postgres   → PostgreSQL 16 database
#   backend    → FastAPI Python API
#   frontend   → React app (dev server with hot reload)
#   nginx      → Reverse proxy (single entry point for browser)
#
# Usage:
#   make up          → Start everything
#   make down        → Stop everything
#   make logs        → Stream all logs
#   make shell-api   → Open shell in backend container
#
# NOTE: Ollama runs NATIVELY on your DGX Spark (not in Docker)
#       so it can access the GPU directly.
#       The backend connects to it via host.docker.internal.
# ─────────────────────────────────────────────────────────────────

name: wealthtracker

# ── Shared network ────────────────────────────────────────────────
# All containers talk to each other on this private network.
# From outside, only the nginx port (80) is exposed.
networks:
  wealthnet:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────
# Data persists here even when containers are destroyed and recreated.
volumes:
  postgres_data:    # PostgreSQL data files
  pgadmin_data:     # pgAdmin settings (optional DB GUI)


services:

  # ── 1. PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wealthtracker-db
    restart: unless-stopped
    networks:
      - wealthnet
    environment:
      POSTGRES_USER:     wealthuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wealthpass}
      POSTGRES_DB:       wealthtracker
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data       # persist data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql  # run on first start
    ports:
      - "5432:5432"   # expose so you can connect with DBeaver/pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthuser -d wealthtracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  # ── 2. FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: wealthtracker-api
    restart: unless-stopped
    networks:
      - wealthnet
    environment:
      # Database — uses the service name "postgres" as hostname
      DATABASE_URL:  ${DATABASE_URL:-postgresql://wealthuser:wealthpass@postgres:5432/wealthtracker}

      # Security — set SECRET_KEY in .env
      SECRET_KEY:    ${SECRET_KEY:-dev-secret-key-change-in-production-please}

      # App settings
      DEBUG:         ${DEBUG:-false}
      APP_VERSION:   "1.0.0"

      # CORS — set via .env
      CORS_ORIGINS:  ${CORS_ORIGINS:-["https://rolling-revenue.com","https://www.rolling-revenue.com"]}

      # Ollama on DGX Spark host machine
      # host.docker.internal → the host machine IP from inside Docker
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL:    qwen3:30b

    volumes:
      # Mount source code for hot reload during development
      - ./app:/app/app

    depends_on:
      postgres:
        condition: service_healthy   # wait until DB is ready

    ports:
      - "8000:8000"   # direct API access (also available via nginx)

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    # Extra host so containers can reach your DGX Spark's host services
    extra_hosts:
      - "host.docker.internal:host-gateway"


  # ── 3. React Frontend (dev mode with hot reload) ────────────────
  frontend:
    image: node:20-alpine
    container_name: wealthtracker-ui
    restart: unless-stopped
    working_dir: /app
    networks:
      - wealthnet
    environment:
      # Use relative /api so it works on any port (9000, 80, etc.)
      VITE_API_URL: /api
    volumes:
      - ./frontend:/app                   # live source code
      - /app/node_modules                 # keep node_modules in container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"   # direct frontend dev server access
    depends_on:
      - backend


  # ── 4. Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: wealthtracker-proxy
    restart: unless-stopped
    networks:
      - wealthnet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # read-only mount
    ports:
      - "9000:80"     # THE main entry point — http://localhost:9000
    depends_on:
      - backend
      - frontend


  # ── 5. pgAdmin (optional DB GUI) ──────────────────────────────
  # Access at http://localhost:5050
  # Login: admin@wealth.local / admin123
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wealthtracker-pgadmin
    restart: unless-stopped
    networks:
      - wealthnet
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@wealth.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"   # single user mode
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    profiles:
      - tools    # Only starts with: docker compose --profile tools up
