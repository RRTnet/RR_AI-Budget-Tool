# nginx/spa.conf — served inside the frontend-static container (prod)
# Handles static files + SPA fallback routing.

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Serve pre-built JS/CSS assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Health probe endpoint — proxy nginx sees this as a frontend file
    location = /health.txt {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }

    # SPA fallback — all unknown routes serve index.html
    # React Router handles the actual routing in the browser
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
    }
}
