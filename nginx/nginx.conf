# ─────────────────────────────────────────────────────────────────
# nginx/nginx.conf  —  WealthTracker Reverse Proxy (hardened)
#
# Traffic flow:
#   Browser → Nginx :80
#     /api/auth/*         → FastAPI  (rate-limited: 5 req/min per IP)
#     /api/advisor/stream → FastAPI  (SSE: buffering off, 5 min timeout)
#     /api/*              → FastAPI  (rate-limited: 30 req/min per IP)
#     /docs /redoc /health→ FastAPI
#     /*                  → React Vite dev server :3000
#
# Production: swap `upstream frontend` to point at the nginx-static
#             container built from Dockerfile.frontend (port 80).
# ─────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security: hide nginx version ──────────────────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               text/event-stream;

    # ── Rate limiting zones ───────────────────────────────────────
    # auth_limit   : protects login/register from brute-force (5 req/min)
    # api_limit    : general API throttle (30 req/min)
    # advisor_limit: AI endpoint — expensive, low burst (6 req/min)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=advisor_limit:10m rate=6r/m;

    # ── Upstream services ─────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;   # Vite dev server
    }

    # ── Main server block ─────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        # ── Security headers ─────────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=()"   always;

        # ── Auth routes — brute-force protected ──────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    10s;
        }

        # ── AI advisor streaming (SSE) ────────────────────────────
        # Must come BEFORE the generic /api/ block (more-specific match wins)
        location /api/advisor/stream {
            limit_req zone=advisor_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE-critical: disable ALL buffering so tokens reach the browser
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;   # 5 min — qwen3 can be slow to start
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;

            add_header X-Accel-Buffering "no"       always;
            add_header Cache-Control     "no-cache" always;
        }

        # ── AI advisor (blocking / non-streaming) ────────────────
        location /api/advisor {
            limit_req zone=advisor_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    180s;   # 3 min
            proxy_send_timeout    30s;
        }

        # ── All other API routes ──────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    10s;
        }

        # ── FastAPI docs & health ─────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json|health) {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ── React frontend ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            # WebSocket support — required for Vite HMR (hot reload)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_intercept_errors on;
            error_page 404 = @frontend_fallback;
        }

        location @frontend_fallback {
            proxy_pass http://frontend;
        }

        # ── Rate-limit error response (JSON for the frontend) ────
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"detail":"Too many requests — please slow down."}';
        }
    }
}
