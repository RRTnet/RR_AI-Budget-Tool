# ─────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Production overrides
#
# Usage:
#   make prod-up   →  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   make prod-down →  docker compose -f docker-compose.yml -f docker-compose.prod.yml down
#
# What this overrides vs. the base docker-compose.yml:
#   ✅ Frontend: replace dev server with a pre-built static nginx container
#   ✅ Backend:  DEBUG=false, no source-code mount
#   ✅ Ports:    only nginx :9000 exposed — internal ports closed off
#   ✅ Resources: memory/CPU limits per service
# ─────────────────────────────────────────────────────────────────

services:

  # ── Backend: production mode ────────────────────────────────────
  backend:
    environment:
      DEBUG:       "false"
      APP_VERSION: "1.0.0"
      # Set SECRET_KEY in your .env file:  openssl rand -hex 32
    # In production the source is baked into the image — no live mount
    volumes: []
    # Close direct port 8000 — only nginx (internal network) talks to backend
    ports: []
    deploy:
      resources:
        limits:
          cpus:   "2.0"
          memory: "1g"
        reservations:
          memory: "256m"
    restart: always

  # ── Frontend: static build served by nginx ──────────────────────
  # Replaces the node:20-alpine dev server with the built React app.
  frontend:
    build:
      context:    .
      dockerfile: Dockerfile.frontend
      target:     runtime
      args:
        VITE_API_URL: /api
    image: wealthtracker-frontend:latest
    command: []
    environment: {}
    # Close direct port 3000 — only nginx (internal network) talks to frontend
    ports: []
    deploy:
      resources:
        limits:
          cpus:   "0.25"
          memory: "64m"
    restart: always

  # ── Postgres: close external port in production ──────────────────
  postgres:
    # Do NOT expose 5432 publicly — backend talks to it on the internal network
    ports: []
    deploy:
      resources:
        limits:
          cpus:   "1.0"
          memory: "512m"
        reservations:
          memory: "128m"
    restart: always

  # ── Nginx: sole public entry point on port 9000 ─────────────────
  # Port 5000 is reserved for HQSACT TRAX AI Chatbot
  nginx:
    ports:
      - "9000:80"
    restart: always
    deploy:
      resources:
        limits:
          cpus:   "0.5"
          memory: "64m"
